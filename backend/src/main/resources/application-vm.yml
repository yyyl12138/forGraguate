server:
  port: ${LOGTRACE_SERVER_PORT:8080}

spring:
  application:
    name: logtrace-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: UTC
  datasource:
    node1:
      url: ${LOGTRACE_NODE1_JDBC_URL:jdbc:mysql://127.0.0.1:3306/logtrace_node1?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC}
      username: ${LOGTRACE_NODE1_JDBC_USERNAME:logtrace_app}
      password: ${LOGTRACE_NODE1_JDBC_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
    node2:
      url: ${LOGTRACE_NODE2_JDBC_URL:jdbc:mysql://192.168.88.102:3306/logtrace_node2?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC}
      username: ${LOGTRACE_NODE2_JDBC_USERNAME:logtrace_app}
      password: ${LOGTRACE_NODE2_JDBC_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
    node3:
      url: ${LOGTRACE_NODE3_JDBC_URL:jdbc:mysql://192.168.88.103:3306/logtrace_node3?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC}
      username: ${LOGTRACE_NODE3_JDBC_USERNAME:logtrace_app}
      password: ${LOGTRACE_NODE3_JDBC_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logtrace:
  node-id: ${LOGTRACE_NODE_ID:node1}
  internal-ingest:
    shared-token: ${LOGTRACE_INTERNAL_INGEST_SHARED_TOKEN:A-token-m2m-7e61a2b3c4d5e6f7g8h9i0j1k2l3m4n5}
  auto-seal:
    enabled: ${LOGTRACE_AUTO_SEAL_ENABLED:true}
    source: ${LOGTRACE_AUTO_SEAL_SOURCE:tomcat-cve-2017-12615}
    poll-interval-millis: ${LOGTRACE_AUTO_SEAL_POLL_INTERVAL_MILLIS:15000}
    buffer-seconds: ${LOGTRACE_AUTO_SEAL_BUFFER_SECONDS:90}
    max-windows-per-run: ${LOGTRACE_AUTO_SEAL_MAX_WINDOWS_PER_RUN:10}
  ledger:
    mode: ${LOGTRACE_LEDGER_MODE:fabric}
    channel-name: ${LOGTRACE_LEDGER_CHANNEL_NAME:mychannel}
    chaincode-name: ${LOGTRACE_LEDGER_CHAINCODE_NAME:log-evidence}
    msp-id: ${LOGTRACE_LEDGER_MSP_ID:Org1MSP}
    peer-endpoint: ${LOGTRACE_LEDGER_PEER_ENDPOINT:peer0.org1.example.com:7051}
    override-authority: ${LOGTRACE_LEDGER_OVERRIDE_AUTHORITY:peer0.org1.example.com}
    tls-cert-path: ${LOGTRACE_LEDGER_TLS_CERT_PATH:/home/yangli/Documents/fabric-workspace/gateway/org1/peer0.org1.example.com/tls/ca.crt}
    client-cert-path: ${LOGTRACE_LEDGER_CLIENT_CERT_PATH:/home/yangli/Documents/fabric-workspace/gateway/org1/users/Admin@org1.example.com/msp/signcerts/Admin@org1.example.com-cert.pem}
    client-key-dir: ${LOGTRACE_LEDGER_CLIENT_KEY_DIR:/home/yangli/Documents/fabric-workspace/gateway/org1/users/Admin@org1.example.com/msp/keystore}
  replica-sync:
    secret: ${LOGTRACE_REPLICA_SYNC_SECRET:A-token-m2m-7e61a2b3c4d5e6f7g8h9i0j1k2l3m4n5}
    scheduler-enabled: ${LOGTRACE_REPLICA_SYNC_SCHEDULER_ENABLED:true}
    poll-interval-millis: ${LOGTRACE_REPLICA_SYNC_POLL_INTERVAL_MILLIS:5000}
    batch-size: ${LOGTRACE_REPLICA_SYNC_BATCH_SIZE:100}
    drain-timeout-millis: ${LOGTRACE_REPLICA_SYNC_DRAIN_TIMEOUT_MILLIS:10000}
  security:
    jwt-secret: ${LOGTRACE_JWT_SECRET:A-token-m2m-7e61a2b3c4d5e6f7g8h9i0j1k2l3m4n5}
    access-token-ttl-seconds: ${LOGTRACE_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${LOGTRACE_REFRESH_TOKEN_TTL_SECONDS:604800}
